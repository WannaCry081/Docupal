# Markdown linting rules for this project.
# Full rule reference: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# MD013 — line length: disabled because long lines in prose are fine
MD013: false

# MD033 — inline HTML: allowed for <details>, <summary>, and placeholder tokens like docupal
MD033: false

# MD041 — first line must be H1: relaxed for files like CHANGELOG that start differently
MD041: false

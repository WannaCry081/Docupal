# Dependabot keeps your dependencies up to date automatically.
# This config updates GitHub Actions versions weekly.
# Add more ecosystems below when your project has a package manager.
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2

updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

